<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BardaBalls</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyDP7r5vwsOX3IqU2g_IilbCDl5sPepH_A0",
      authDomain: "wezienwel.firebaseapp.com",
      projectId: "wezienwel",
      storageBucket: "wezienwel.firebasestorage.app",
      messagingSenderId: "119572340376",
      appId: "1:119572340376:web:4908690b8d488bf306baed"
    });
    const db = firebase.firestore();
  </script>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f2f0ec;
      --ink: #111;
      --muted: #888;
      --border: #ddd;
      --accent: #111;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── VIEWS ── */
    .view { display: none; }
    .view.active { display: block; }

    /* ════════════════════════════════
       HOME — MOBILE FIRST
    ════════════════════════════════ */

    /* Mobile: image on top, content below */
    #view-home.active {
      display: flex;
      flex-direction: column;
    }

    .home-right { order: -1; } /* image first on mobile */
    .home-left  { order:  0; }

    /* Mobile: hide the desktop topbar, show the image-overlay one */
    .topbar-desktop { display: none; }

    /* Topbar — overlaid on image (mobile) */
    .topbar {
      position: absolute;
      top: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 1.5rem;
      z-index: 10;
    }

    .logo {
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: white;
      text-shadow: 0 1px 6px rgba(0,0,0,0.35);
    }

    .admin-link {
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.75);
      background: none;
      border: none;
      cursor: pointer;
    }

    /* Hero image */
    .hero-wrap {
      position: relative;
      width: 100%;
      height: 62vh;
      min-height: 320px;
      overflow: hidden;
      background: #c8c0b5;
    }

    #hero-img-container {
      width: 100%;
      height: 100%;
    }

    .hero-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .hero-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 5rem;
      background: linear-gradient(160deg, #d8d0c5, #bfb8ae);
    }

    /* Dish info strip */
    .dish-info {
      padding: 2rem 1.5rem 0;
    }

    .dish-label {
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.6rem;
    }

    .dish-title {
      font-size: clamp(2rem, 7vw, 3.2rem);
      font-weight: 300;
      letter-spacing: -0.02em;
      line-height: 1.05;
      margin-bottom: 0.8rem;
    }

    .dish-price-tag {
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 1.2rem;
    }

    .dish-desc {
      font-size: 0.88rem;
      font-weight: 300;
      line-height: 1.75;
      color: #555;
      max-width: 480px;
      padding-bottom: 1.2rem;
    }

    .dish-tagline {
      font-size: 0.88rem;
      font-weight: 300;
      color: var(--ink);
      max-width: 480px;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--border);
    }

    /* No dish state */
    .no-dish-wrap {
      padding: 3rem 1.5rem;
    }

    .no-dish-label {
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .no-dish-title {
      font-size: clamp(1.8rem, 6vw, 2.5rem);
      font-weight: 300;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 1rem;
      color: var(--ink);
    }

    .no-dish-sub {
      font-size: 0.85rem;
      color: var(--muted);
      font-weight: 300;
      line-height: 1.7;
    }

    /* ── ORDER SECTION ── */
    .order-wrap {
      padding: 2rem 1.5rem 4rem;
      max-width: 480px;
    }

    .order-heading {
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }

    .field {
      margin-bottom: 1rem;
    }

    .field input,
    .field textarea {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      padding: 0.6rem 0;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.95rem;
      font-weight: 300;
      color: var(--ink);
      outline: none;
      border-radius: 0;
      -webkit-appearance: none;
      transition: border-color 0.2s;
    }

    .field input::placeholder,
    .field textarea::placeholder {
      color: #bbb;
    }

    .field input:focus,
    .field textarea:focus {
      border-bottom-color: var(--ink);
    }

    .field textarea {
      resize: none;
      height: 60px;
    }

    /* Qty + submit row */
    .bottom-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 1.8rem;
      gap: 1rem;
    }

    .qty-control {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .qty-btn {
      width: 32px; height: 32px;
      border: 1px solid var(--border);
      background: none;
      border-radius: 50%;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--ink);
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .qty-btn:hover { background: var(--ink); color: white; border-color: var(--ink); }

    .qty-num {
      font-size: 1rem;
      font-weight: 400;
      min-width: 20px;
      text-align: center;
    }

    .price-inline {
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.02em;
      display: none;
    }

    .submit-btn {
      flex: 1;
      max-width: 240px;
      padding: 0.9rem 1.5rem;
      background: var(--ink);
      color: white;
      border: none;
      border-radius: 2px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .submit-btn:hover { opacity: 0.75; }
    .submit-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* Success */
    .success-msg {
      padding: 2.5rem 1.5rem;
    }
    .success-msg .bust-wrap {
      margin-bottom: 1.5rem;
    }
    .success-msg .bust-wrap svg {
      width: 140px;
      height: auto;
      display: block;
    }
    .success-msg .s-label {
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.8rem;
    }
    .success-msg .s-title {
      font-size: 1.6rem;
      font-weight: 300;
      letter-spacing: -0.01em;
      margin-bottom: 0.5rem;
    }
    .success-msg .s-sub {
      font-size: 0.85rem;
      color: var(--muted);
      font-weight: 300;
    }

    /* Footer */
    .site-footer {
      padding: 2rem 1.5rem;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #ccc;
    }

    /* Closed badge */
    .closed-badge {
      display: inline-block;
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 0.3rem 0.7rem;
      border-radius: 2px;
      margin-top: 1.2rem;
    }

    /* ════════════════════════════════
       DESKTOP SPLIT LAYOUT
    ════════════════════════════════ */
    @media (min-width: 768px) {
      #view-home.active {
        display: grid;
        grid-template-areas: "left right";
        grid-template-columns: 1fr 1fr;
        min-height: 100vh;
      }

      .home-left {
        grid-area: left;
        display: flex;
        flex-direction: column;
        padding: 2.5rem;
        overflow-y: auto;
        min-height: 100vh;
        order: 0;
      }

      .home-right {
        grid-area: right;
        position: sticky;
        top: 0;
        height: 100vh;
        overflow: hidden;
        order: 0;
      }

      .topbar {
        position: static;
        padding: 0 0 3rem;
      }

      /* Desktop: show in-flow topbar, hide hero overlay */
      .topbar-desktop { display: flex; }
      .hero-wrap .topbar { display: none; }

      .logo { color: var(--ink); text-shadow: none; }
      .admin-link { color: var(--muted); }

      .dish-info { padding: 0; flex: 1; }

      .order-wrap { padding: 2rem 0 3rem; max-width: 100%; }

      .site-footer { padding: 0; margin-top: auto; }

      .hero-wrap { height: 100%; min-height: unset; }
    }

    /* ════════════════════════════════
       ADMIN — PASSWORD GATE
    ════════════════════════════════ */
    .gate {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .gate-inner {
      width: 100%;
      max-width: 320px;
    }

    .gate-logo {
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 3rem;
    }

    .gate-title {
      font-size: 1.6rem;
      font-weight: 300;
      letter-spacing: -0.01em;
      margin-bottom: 0.5rem;
    }

    .gate-sub {
      font-size: 0.82rem;
      color: var(--muted);
      font-weight: 300;
      margin-bottom: 2rem;
    }

    .gate-error {
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      color: #c00;
      margin-top: 0.8rem;
      display: none;
    }

    .gate-back {
      background: none;
      border: none;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      margin-top: 1rem;
      display: block;
    }

    /* ════════════════════════════════
       ADMIN PANEL
    ════════════════════════════════ */
    .admin-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem 2rem;
      border-bottom: 1px solid var(--border);
    }

    .admin-logo {
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .admin-nav {
      display: flex;
      gap: 2rem;
      align-items: center;
    }

    .admin-tab {
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      padding-bottom: 2px;
      border-bottom: 1px solid transparent;
      transition: all 0.15s;
    }
    .admin-tab.active { color: var(--ink); border-bottom-color: var(--ink); }

    .admin-logout {
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
    }

    .admin-body {
      padding: 2.5rem 2rem;
      max-width: 560px;
    }

    .admin-section-title {
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2rem;
    }

    /* Admin fields */
    .a-field { margin-bottom: 1.5rem; }

    .a-label {
      display: block;
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .a-field input,
    .a-field textarea {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      padding: 0.5rem 0;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.95rem;
      font-weight: 300;
      color: var(--ink);
      outline: none;
      border-radius: 0;
      -webkit-appearance: none;
      transition: border-color 0.2s;
    }
    .a-field input:focus,
    .a-field textarea:focus { border-bottom-color: var(--ink); }
    .a-field textarea { resize: vertical; min-height: 80px; }

    /* Image upload */
    .img-upload-area {
      border: 1px dashed var(--border);
      padding: 2.5rem;
      text-align: center;
      cursor: pointer;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      transition: border-color 0.2s;
    }
    .img-upload-area:hover { border-color: var(--ink); color: var(--ink); }

    .img-preview-admin {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      display: none;
      margin-bottom: 0.5rem;
    }

    .img-change-btn {
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      display: none;
      margin-bottom: 1.5rem;
    }

    /* Compress indicator */
    .prog-wrap { display: none; margin-bottom: 1rem; }
    .prog-lbl { font-size: 0.65rem; letter-spacing: 0.08em; color: var(--muted); }

    /* Toggle */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 0;
      border-top: 1px solid var(--border);
      margin: 1.5rem 0;
    }
    .toggle-text { font-size: 0.82rem; font-weight: 300; }
    .toggle-sub { font-size: 0.65rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
    .toggle { position: relative; width: 44px; height: 24px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0;
      background: #ddd;
      border-radius: 24px;
      cursor: pointer;
      transition: 0.2s;
    }
    .slider:before {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      left: 3px; top: 3px;
      background: white;
      border-radius: 50%;
      transition: 0.2s;
    }
    input:checked + .slider { background: var(--ink); }
    input:checked + .slider:before { transform: translateX(20px); }

    /* Admin buttons */
    .btn-pub {
      padding: 0.85rem 2rem;
      background: var(--ink);
      color: white;
      border: none;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-pub:hover { opacity: 0.7; }
    .btn-pub:disabled { opacity: 0.3; cursor: not-allowed; }

    .btn-ghost {
      padding: 0.85rem 2rem;
      background: none;
      color: var(--muted);
      border: 1px solid var(--border);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      margin-left: 0.8rem;
      transition: all 0.15s;
    }
    .btn-ghost:hover { border-color: var(--ink); color: var(--ink); }

    /* Orders */
    .stats-strip {
      display: flex;
      gap: 3rem;
      margin-bottom: 2.5rem;
    }
    .stat-val {
      font-size: 2.5rem;
      font-weight: 300;
      letter-spacing: -0.03em;
      line-height: 1;
    }
    .stat-lbl {
      font-size: 0.62rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 0.3rem;
    }

    .order-row {
      padding: 1.25rem 0;
      border-top: 1px solid var(--border);
    }
    .order-row:last-child { border-bottom: 1px solid var(--border); }
    .order-row-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.4rem;
    }
    .order-row-name {
      font-size: 0.92rem;
      font-weight: 500;
    }
    .order-row-qty {
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      color: var(--muted);
    }
    .order-row-detail {
      font-size: 0.8rem;
      font-weight: 300;
      color: var(--muted);
      line-height: 1.6;
    }
    .order-row-delete {
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      margin-top: 0.6rem;
      display: block;
    }
    .order-row-delete:hover { color: #c00; }

    .order-row-note {
      font-size: 0.78rem;
      font-style: italic;
      color: #aaa;
      margin-top: 0.2rem;
    }

    .no-orders {
      padding: 3rem 0;
      font-size: 0.82rem;
      font-weight: 300;
      color: var(--muted);
    }

    .clear-orders-btn {
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #bbb;
      background: none;
      border: none;
      cursor: pointer;
      margin-bottom: 1.5rem;
      display: block;
    }
    .clear-orders-btn:hover { color: #c00; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 2rem; left: 50%;
      transform: translateX(-50%) translateY(120%);
      background: var(--ink);
      color: white;
      font-size: 0.75rem;
      letter-spacing: 0.06em;
      padding: 0.7rem 1.4rem;
      border-radius: 2px;
      z-index: 999;
      transition: transform 0.25s ease;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    .loading-txt {
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #bbb;
      padding: 3rem 1.5rem;
    }
  </style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- ════════════════════════════════
     HOME
════════════════════════════════ -->
<div class="view active" id="view-home">

  <!-- Mobile: left column is just stacked, desktop: grid -->
  <div class="home-left">
    <!-- Desktop topbar (in flow) -->
    <div class="topbar topbar-desktop">
      <div class="logo">BardaBalls</div>
      <button class="admin-link" onclick="showView('admin-gate')">Admin</button>
    </div>

    <!-- Dish content -->
    <div id="dish-content"><div class="loading-txt">laden…</div></div>

    <!-- Order form -->
    <div id="order-section" style="display:none;">
      <div id="order-form">
        <div class="order-wrap">
          <div class="order-heading">Jouw bestelling</div>
          <div class="field">
            <input type="text" id="order-name" placeholder="Naam">
          </div>
          <div class="field">
            <input type="text" id="order-address" placeholder="Adres">
          </div>
          <div class="field">
            <input type="text" id="order-city" placeholder="Gemeente">
          </div>
          <div class="field">
            <textarea id="order-note" placeholder="Notitie (optioneel)"></textarea>
          </div>
          <div class="bottom-row">
            <div class="qty-control">
              <button class="qty-btn" onclick="changeQty(-1)">−</button>
              <span class="qty-num" id="qty-display">1</span>
              <button class="qty-btn" onclick="changeQty(1)">+</button>
              <span class="price-inline" id="price-inline"></span>
            </div>
            <button class="submit-btn" id="submit-btn" onclick="submitOrder()">Bestellen</button>
          </div>
        </div>
      </div>
      <!-- Success state (hidden by default) -->
      <div id="order-success" style="display:none;"></div>
    </div>

    <div class="site-footer">Bardaballs</div>
  </div>

  <!-- Right column: image with overlaid mobile topbar -->
  <div class="home-right">
    <div class="hero-wrap" id="hero-wrap">
      <div class="topbar">
        <div class="logo">BardaBalls</div>
        <button class="admin-link" onclick="showView('admin-gate')">Admin</button>
      </div>
      <div id="hero-img-container">
        <div class="hero-placeholder">🍽</div>
      </div>
    </div>
  </div>

</div>

<!-- ════════════════════════════════
     ADMIN GATE
════════════════════════════════ -->
<div class="view" id="view-admin-gate">
  <div class="gate">
    <div class="gate-inner">
      <div class="gate-logo">BardaBalls</div>
      <div class="gate-title">Keuken</div>
      <div class="gate-sub">Voer het wachtwoord in.</div>
      <div class="field">
        <input type="password" id="admin-pass" placeholder="Wachtwoord"
          onkeydown="if(event.key==='Enter')checkPass()">
      </div>
      <button class="submit-btn" onclick="checkPass()" style="width:100%;max-width:100%;margin-top:1rem;">Verder</button>
      <div class="gate-error" id="pass-error">Fout wachtwoord.</div>
      <button class="gate-back" onclick="showView('home')">← Terug</button>
    </div>
  </div>
</div>

<!-- ════════════════════════════════
     ADMIN PANEL
════════════════════════════════ -->
<div class="view" id="view-admin">
  <div class="admin-topbar">
    <div class="admin-logo">BardaBalls</div>
    <div class="admin-nav">
      <button class="admin-tab active" id="tab-dish" onclick="switchTab('dish')">Gerecht</button>
      <button class="admin-tab" id="tab-orders" onclick="switchTab('orders')">Bestellingen</button>
      <button class="admin-logout" onclick="logout()">Uitloggen</button>
    </div>
  </div>

  <!-- DISH TAB -->
  <div class="admin-body" id="tab-content-dish">
    <div class="admin-section-title">Huidig gerecht</div>

    <div class="a-field">
      <label class="a-label">Naam</label>
      <input type="text" id="admin-dish-name" placeholder="bijv. Vol-au-vent">
    </div>
    <div class="a-field">
      <label class="a-label">Beschrijving</label>
      <textarea id="admin-dish-desc" placeholder="Wat maakt dit gerecht bijzonder…"></textarea>
    </div>
    <div class="a-field">
      <label class="a-label">Prijs</label>
      <input type="text" id="admin-dish-price" placeholder="bijv. €30 voor 3 personen">
    </div>

    <div class="a-field">
      <label class="a-label">Foto</label>
      <img class="img-preview-admin" id="admin-img-preview" alt="">
      <button class="img-change-btn" id="img-change-btn" onclick="document.getElementById('img-input').click()">
        Foto wijzigen
      </button>
      <div class="prog-wrap" id="prog-wrap">
        <div class="prog-lbl" id="prog-lbl">Afbeelding verwerken…</div>
      </div>
      <div class="img-upload-area" id="upload-area" onclick="document.getElementById('img-input').click()">
        Foto uploaden
      </div>
      <input type="file" id="img-input" accept="image/*" style="display:none" onchange="handleImageSelect(event)">
    </div>

    <div class="toggle-row">
      <div>
        <div class="toggle-text">Bestellingen open</div>
        <div class="toggle-sub">Zet uit om te sluiten</div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="admin-accepting" checked>
        <span class="slider"></span>
      </label>
    </div>

    <div>
      <button class="btn-pub" id="save-dish-btn" onclick="saveDish()">Publiceren</button>
      <button class="btn-ghost" onclick="clearDish()">Wissen</button>
    </div>
  </div>

  <!-- ORDERS TAB -->
  <div class="admin-body" id="tab-content-orders" style="display:none;">
    <div class="admin-section-title">Bestellingen</div>
    <div class="stats-strip" id="stats-strip"></div>
    <button class="clear-orders-btn" onclick="clearOrders()">Alles wissen</button>
    <div id="orders-list"><div class="loading-txt">laden…</div></div>
  </div>
</div>

<script>
  const PASS = 'barda2024';
  const DISH_REF = db.collection('bardaballs').doc('dish');
  const ORDERS_REF = db.collection('bardaballs_orders');

  let qty = 1;
  let currentDish = null;
  let authenticated = false;
  let pendingImageFile = null;
  let dishUnsub = null;
  let ordersUnsub = null;

  // ── ROMAN BUST SVG ──
  const ROMAN_BUST_SVG = `<svg viewBox="0 0 180 260" xmlns="http://www.w3.org/2000/svg">
    <!-- Pedestal -->
    <rect x="52" y="214" width="76" height="36" rx="2" fill="#b8b2ac"/>
    <rect x="46" y="208" width="88" height="10" rx="1" fill="#ada7a1"/>
    <!-- Toga / bust base -->
    <path d="M28 212 C28 186 58 172 90 170 C122 172 152 186 152 212 Z" fill="#cdc7c1"/>
    <path d="M42 206 C52 184 70 174 90 172" fill="none" stroke="#b8b2ac" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M138 206 C128 184 110 174 90 172" fill="none" stroke="#b8b2ac" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Neck -->
    <path d="M79 170 C79 152 101 152 101 170 L99 174 C99 174 90 177 81 174 Z" fill="#d0cac4"/>
    <!-- Head -->
    <ellipse cx="90" cy="118" rx="36" ry="43" fill="#d6d0ca"/>
    <!-- Hair -->
    <path d="M54 120 C56 90 70 70 90 66 C110 70 124 90 126 120" fill="#c2bbb5"/>
    <path d="M57 120 C59 93 72 76 90 72 C108 76 121 93 123 120" fill="#ccc6c0"/>
    <path d="M62 112 C65 88 76 74 90 70" fill="none" stroke="#b5afa9" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
    <path d="M118 112 C115 88 104 74 90 70" fill="none" stroke="#b5afa9" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
    <!-- Laurel wreath leaves left -->
    <ellipse cx="61" cy="94" rx="8" ry="4" fill="#8fad78" transform="rotate(-40 61 94)"/>
    <ellipse cx="56" cy="106" rx="8" ry="4" fill="#9aba84" transform="rotate(-22 56 106)"/>
    <ellipse cx="57" cy="118" rx="8" ry="4" fill="#8fad78" transform="rotate(-6 57 118)"/>
    <!-- Laurel wreath leaves right -->
    <ellipse cx="119" cy="94" rx="8" ry="4" fill="#8fad78" transform="rotate(40 119 94)"/>
    <ellipse cx="124" cy="106" rx="8" ry="4" fill="#9aba84" transform="rotate(22 124 106)"/>
    <ellipse cx="123" cy="118" rx="8" ry="4" fill="#8fad78" transform="rotate(6 123 118)"/>
    <!-- Wreath centre -->
    <ellipse cx="90" cy="80" rx="8" ry="5" fill="#9aba84"/>
    <!-- Brow -->
    <path d="M76 106 Q82 103 88 105" fill="none" stroke="#9c9690" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M92 105 Q98 103 104 106" fill="none" stroke="#9c9690" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Eyes -->
    <ellipse cx="82" cy="114" rx="7" ry="5.5" fill="white"/>
    <ellipse cx="82" cy="114" rx="4.5" ry="4.5" fill="#7a7470"/>
    <ellipse cx="81" cy="113" rx="1.5" ry="1.5" fill="white"/>
    <ellipse cx="98" cy="114" rx="7" ry="5.5" fill="white"/>
    <ellipse cx="98" cy="114" rx="4.5" ry="4.5" fill="#7a7470"/>
    <ellipse cx="97" cy="113" rx="1.5" ry="1.5" fill="white"/>
    <!-- Nose -->
    <path d="M90 120 L87 131 Q90 134 93 131 L90 120" fill="#c6c0ba"/>
    <!-- Smile -->
    <path d="M82 140 Q90 147 98 140" fill="none" stroke="#9a9490" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M83 138 Q90 135 97 138" fill="none" stroke="#aca6a0" stroke-width="1" stroke-linecap="round"/>
    <!-- Cheek highlights -->
    <ellipse cx="73" cy="128" rx="7" ry="5" fill="#e0dad4" opacity="0.45"/>
    <ellipse cx="107" cy="128" rx="7" ry="5" fill="#e0dad4" opacity="0.45"/>
    <!-- Thumbs up arm (right side) -->
    <path d="M148 188 C162 174 170 154 167 136 C165 124 158 118 153 124 L150 133" fill="#cdc7c1" stroke="#c0bab4" stroke-width="1"/>
    <!-- Fist -->
    <rect x="144" y="118" width="26" height="20" rx="7" fill="#d0cac4"/>
    <!-- Finger knuckle lines -->
    <line x1="149" y1="124" x2="166" y2="124" stroke="#bfb9b3" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
    <line x1="149" y1="130" x2="166" y2="130" stroke="#bfb9b3" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
    <!-- Thumb pointing up -->
    <path d="M153 118 C152 108 156 102 161 104 C166 106 166 116 161 118 Z" fill="#d6d0ca" stroke="#c0bab4" stroke-width="0.8"/>
    <!-- Thumb knuckle -->
    <path d="M154 112 Q158 110 162 112" fill="none" stroke="#bfb9b3" stroke-width="0.8" stroke-linecap="round" opacity="0.7"/>
  </svg>`;

  // ── INIT ──
  function init() {
    listenToDish();
  }

  // ── VIEWS ──
  function showView(name) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    const map = { home: 'view-home', 'admin-gate': 'view-admin-gate', admin: 'view-admin' };
    if (name === 'admin' && !authenticated) { showView('admin-gate'); return; }
    document.getElementById(map[name]).classList.add('active');
    if (name === 'admin') { loadAdminDish(); }
    window.scrollTo(0, 0);
  }

  // ── AUTH ──
  function checkPass() {
    if (document.getElementById('admin-pass').value === PASS) {
      authenticated = true;
      document.getElementById('admin-pass').value = '';
      document.getElementById('pass-error').style.display = 'none';
      showView('admin');
    } else {
      document.getElementById('pass-error').style.display = 'block';
    }
  }

  function logout() {
    authenticated = false;
    if (ordersUnsub) { ordersUnsub(); ordersUnsub = null; }
    showView('home');
  }

  // ── DISH LISTENER ──
  function listenToDish() {
    if (dishUnsub) dishUnsub();
    dishUnsub = DISH_REF.onSnapshot(doc => {
      currentDish = doc.exists ? doc.data() : null;
      renderDish(currentDish);
    }, () => renderDish(null));
  }

  function renderDish(dish) {
    const content = document.getElementById('dish-content');
    const orderSection = document.getElementById('order-section');
    const heroWrap = document.getElementById('hero-wrap');
    qty = 1;
    document.getElementById('qty-display').textContent = '1';

    // Hero image
    const heroImg = document.getElementById('hero-img-container');
    if (dish && dish.imageData) {
      heroImg.innerHTML = `<img class="hero-img" src="${dish.imageData}" alt="${dish.name}">`;
    } else {
      heroImg.innerHTML = `<div class="hero-placeholder">🍽</div>`;
    }

    // Reset order form state
    const orderForm = document.getElementById('order-form');
    const orderSuccess = document.getElementById('order-success');
    if (orderForm) { orderForm.style.display = 'block'; ['order-name','order-address','order-city','order-note'].forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; }); }
    if (orderSuccess) orderSuccess.style.display = 'none';
    qty = 1;
    const qtyEl = document.getElementById('qty-display');
    if (qtyEl) qtyEl.textContent = '1';

    if (!dish || !dish.name) {
      content.innerHTML = `
        <div class="no-dish-wrap">
          <div class="no-dish-label">De keuken van Chef Barda</div>
          <div class="no-dish-title">Nog niets<br>op het vuur.</div>
          <div class="no-dish-sub">Ik kook niet elke dag. Maar als ik kook, doe ik het goed. Bestel, geef je adres, en ik sta aan je deur. Vacuum verpakt, vers, gemaakt met iets te veel liefde en absoluut te veel boter.</div>
        </div>`;
      orderSection.style.display = 'none';
      return;
    }

    content.innerHTML = `
      <div class="dish-info">
        <div class="dish-label">Het gerecht van vandaag</div>
        <div class="dish-title">${dish.name}</div>
        <div class="dish-price-tag">${dish.price || ''}</div>
        <div class="dish-desc">${dish.description || ''}</div>
        <div class="dish-tagline">Ik kook niet elke dag. Maar als ik kook, doe ik het goed. Bestel, geef je adres, en ik sta aan je deur. Vacuum verpakt, vers, gemaakt met iets te veel liefde en absoluut te veel boter.</div>
        ${dish.accepting === false ? '<div class="closed-badge">Bestellingen gesloten</div>' : ''}
      </div>`;

    if (dish.accepting !== false) {
      orderSection.style.display = 'block';
      document.getElementById('price-inline').textContent = dish.price || '';
    } else {
      orderSection.style.display = 'none';
    }
  }

  // ── ORDER ──
  function changeQty(delta) {
    qty = Math.max(1, qty + delta);
    document.getElementById('qty-display').textContent = qty;
  }

  async function submitOrder() {
    const name    = document.getElementById('order-name').value.trim();
    const address = document.getElementById('order-address').value.trim();
    const city    = document.getElementById('order-city').value.trim();
    const note    = document.getElementById('order-note').value.trim();

    if (!name)    { toast('Vul je naam in'); return; }
    if (!address) { toast('Vul je adres in'); return; }
    if (!city)    { toast('Vul je gemeente in'); return; }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true; btn.textContent = '…';

    try {
      await ORDERS_REF.add({
        dish: currentDish.name,
        price: currentDish.price || '',
        name, address, city, note, qty,
        date: firebase.firestore.FieldValue.serverTimestamp()
      });
      document.getElementById('order-form').style.display = 'none';
      const successEl = document.getElementById('order-success');
      successEl.style.display = 'block';
      successEl.innerHTML = `
        <div class="success-msg">
          <div class="bust-wrap">${ROMAN_BUST_SVG}</div>
          <div class="s-label">Bestelling geplaatst</div>
          <div class="s-title">Merci, ${name}.</div>
          <div class="s-sub">Barda neemt contact op. Blijf in de buurt.</div>
        </div>`;
      window.scrollTo(0, 0);
      setTimeout(() => showView('home'), 4000);
    } catch(e) {
      toast('Er ging iets mis. Probeer opnieuw.');
      btn.disabled = false; btn.textContent = 'Bestellen';
    }
  }

  // ── ADMIN DISH ──
  function loadAdminDish() {
    DISH_REF.get().then(doc => {
      if (!doc.exists) return;
      const d = doc.data();
      document.getElementById('admin-dish-name').value  = d.name || '';
      document.getElementById('admin-dish-desc').value  = d.description || '';
      document.getElementById('admin-dish-price').value = d.price || '';
      document.getElementById('admin-accepting').checked = d.accepting !== false;
      if (d.imageData) showAdminPreview(d.imageData);
    });
  }

  function showAdminPreview(src) {
    const preview = document.getElementById('admin-img-preview');
    preview.src = src; preview.style.display = 'block';
    document.getElementById('upload-area').style.display = 'none';
    document.getElementById('img-change-btn').style.display = 'inline';
  }

  function handleImageSelect(e) {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 15 * 1024 * 1024) { toast('Afbeelding te groot (max 15MB)'); return; }
    pendingImageFile = file;
    const reader = new FileReader();
    reader.onload = ev => showAdminPreview(ev.target.result);
    reader.readAsDataURL(file);
  }

  // Compress image via canvas to keep Firestore doc size small
  function compressImage(file, maxPx = 1200, quality = 0.82) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = ev => {
        const img = new Image();
        img.onload = () => {
          const scale = Math.min(1, maxPx / Math.max(img.width, img.height));
          const canvas = document.createElement('canvas');
          canvas.width  = Math.round(img.width  * scale);
          canvas.height = Math.round(img.height * scale);
          canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
          resolve(canvas.toDataURL('image/jpeg', quality));
        };
        img.onerror = reject;
        img.src = ev.target.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  async function saveDish() {
    const name        = document.getElementById('admin-dish-name').value.trim();
    const description = document.getElementById('admin-dish-desc').value.trim();
    const price       = document.getElementById('admin-dish-price').value.trim();
    const accepting   = document.getElementById('admin-accepting').checked;

    if (!name)  { toast('Naam ontbreekt'); return; }
    if (!price) { toast('Prijs ontbreekt'); return; }

    const btn = document.getElementById('save-dish-btn');
    btn.disabled = true; btn.textContent = 'Opslaan…';

    try {
      let imageData = null;
      const existing = await DISH_REF.get();
      if (existing.exists) imageData = existing.data().imageData || null;

      if (pendingImageFile) {
        document.getElementById('prog-wrap').style.display = 'block';
        imageData = await compressImage(pendingImageFile);
        document.getElementById('prog-wrap').style.display = 'none';
        pendingImageFile = null;
      }

      await DISH_REF.set({ name, description, price, accepting, imageData });
      toast('Gepubliceerd.');
    } catch(e) {
      console.error(e);
      toast('Opslaan mislukt: ' + e.message);
    } finally {
      btn.disabled = false; btn.textContent = 'Publiceren';
    }
  }

  async function clearDish() {
    if (!confirm('Gerecht verwijderen en bestellingen sluiten?')) return;
    try {
      await DISH_REF.delete();
      pendingImageFile = null;
      ['admin-dish-name','admin-dish-desc','admin-dish-price'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('admin-img-preview').style.display = 'none';
      document.getElementById('img-change-btn').style.display = 'none';
      document.getElementById('upload-area').style.display = 'block';
      document.getElementById('img-input').value = '';
      toast('Gewist.');
    } catch(e) { toast('Wissen mislukt.'); }
  }

  // ── ORDERS ──
  function listenToOrders() {
    if (ordersUnsub) ordersUnsub();
    document.getElementById('orders-list').innerHTML = '<div class="loading-txt">laden…</div>';
    ordersUnsub = ORDERS_REF.orderBy('date', 'desc').onSnapshot(snap => {
      renderOrders(snap.docs.map(d => ({ id: d.id, ...d.data() })));
    }, () => { document.getElementById('orders-list').innerHTML = '<div class="no-orders">Kon niet laden.</div>'; });
  }

  function renderOrders(orders) {
    document.getElementById('stats-strip').innerHTML = `
      <div>
        <div class="stat-val">${orders.length}</div>
        <div class="stat-lbl">Bestellingen</div>
      </div>
      <div>
        <div class="stat-val">${orders.reduce((s,o) => s + (o.qty||1), 0)}</div>
        <div class="stat-lbl">Porties</div>
      </div>`;

    if (!orders.length) {
      document.getElementById('orders-list').innerHTML = '<div class="no-orders">Nog geen bestellingen.</div>';
      return;
    }

    document.getElementById('orders-list').innerHTML = orders.map(o => {
      const d = o.date ? o.date.toDate().toLocaleString('nl-BE', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' }) : '—';
      return `<div class="order-row">
        <div class="order-row-top">
          <div class="order-row-name">${o.name}</div>
          <div class="order-row-qty">${o.qty}× &nbsp;·&nbsp; ${d}</div>
        </div>
        <div class="order-row-detail">${o.address}, ${o.city} &nbsp;·&nbsp; ${o.price || ''}</div>
        ${o.note ? `<div class="order-row-note">"${o.note}"</div>` : ''}
        <button class="order-row-delete" onclick="deleteOrder('${o.id}')">Verwijderen</button>
      </div>`;
    }).join('');
  }

  async function clearOrders() {
    if (!confirm('Alle bestellingen verwijderen?')) return;
    try {
      const snap = await ORDERS_REF.get();
      const batch = db.batch();
      snap.docs.forEach(d => batch.delete(d.ref));
      await batch.commit();
      toast('Bestellingen gewist.');
    } catch(e) { toast('Mislukt.'); }
  }

  async function deleteOrder(id) {
    try {
      await ORDERS_REF.doc(id).delete();
    } catch(e) { toast('Verwijderen mislukt.'); }
  }

  // ── TABS ──
  function switchTab(tab) {
    document.getElementById('tab-content-dish').style.display   = tab === 'dish' ? 'block' : 'none';
    document.getElementById('tab-content-orders').style.display = tab === 'orders' ? 'block' : 'none';
    document.getElementById('tab-dish').classList.toggle('active', tab === 'dish');
    document.getElementById('tab-orders').classList.toggle('active', tab === 'orders');
    if (tab === 'orders') listenToOrders();
  }

  // ── TOAST ──
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2500);
  }

  init();
</script>
</body>
</html>
